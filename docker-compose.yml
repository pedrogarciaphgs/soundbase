services:
  app:
    build: .
    container_name: soundbase-app

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      NODE_ENV: development

    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine

    container_name: soundbase-postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soundbase

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: